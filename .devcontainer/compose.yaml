services:
  lualatex-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: lualatex-worker:latest
    container_name: lualatex-worker
    tty: true
    stdin_open: true
    working_dir: /workspace
    environment:
      - TERM=xterm-256color
      - COLORTERM=truecolor
    volumes:
      - .:/workspace
      - ${HOME}/.ssh:/home/ubuntu/.ssh:ro
      - ${HOME}/.gitconfig:/home/ubuntu/.gitconfig:ro
    command: /bin/bash
